<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZA HUT | 系統忙碌中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="pizza-spinner">🍕</div>
        <p id="loader-text">正在接通門市連線中... 0%</p>
    </div>

    <main class="card">
        <header class="card-header">
            <h1 class="brand-name">PIZZA HUT</h1>
            <h2 class="main-title">系統目前稍微塞車了 🚥</h2>
        </header>

        <section class="content">
            <p>親愛的顧客請放心，目前湧入人數較多，<br>系統正在進行流量管制以保護您的訂單資料。</p>
            <p class="highlight">您的操作並未中斷，請給我們一點時間為您安排連線，<br><strong>請不要重新整理網頁</strong>，以免重新排隊喔！</p>
        </section>

        <div class="queue-status">
            <h3 class="status-title">正在為您保留連線通道...</h3>
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>
            <p class="timer-text">將在 <span id="seconds">15</span> 秒後自動為您重新連線</p>
        </div>

        <div class="info-box">
            <span class="icon">🎫</span> 已為您鎖定排隊序號，請勿關閉視窗
        </div>

        <footer class="tips">
            💡 提示：深呼吸，喝口水，美味值得等待。
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
