<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>必勝客 | 系統緊急維護中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="pizza-spinner">🍕</div>
        <p id="loader-text">正在嘗試恢復與門市的連線... 0%</p>
        <p class="sub-text">請稍候，工程師正在搶修中</p>
    </div>

    <div class="container">
        <h1 class="logo">PIZZA HUT</h1>
        
        <div class="error-box">
            <h2 class="error-title">抱歉！系統暫時無法處理您的訂單</h2>
            <p id="status-comfort-msg">目前訂購系統發生預期外錯誤，我們正在全力修復...</p>
        </div>

        <div class="progress-bar">
            <div class="step active" id="s1">偵測異常</div>
            <div class="step" id="s2">工程搶修</div>
            <div class="step" id="s3">數據校驗</div>
            <div class="step" id="s4">恢復服務</div>
        </div>

        <button id="update-btn">查看修復進度</button>

        <footer>
            <p>若您已完成付款但未收到通知，請務必聯繫客服：</p>
            <a href="tel:0800276276" class="phone-link">
                <strong>0800-276-276</strong>
            </a>
            <p class="service-time">(服務時間：09:00 - 23:00)</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
